<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeTrace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&amp;display=swap');

        body {
            font-family: 'Space Grotesk', system_ui, sans-serif;
        }

        .logo-font {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            letter-spacing: -0.05em;
        }

        .gradient-bg {
            background: linear-gradient(180deg,
                    #f8f8f8 0%,
                    #f0f0f0 18%,
                    #e8e8e8 32%,
                    #4a4a4a 55%,
                    #222222 72%,
                    #111111 88%,
                    #0a0a0a 100%);
        }

        .input-container {
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.35);
        }

        .arrow-btn {
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .arrow-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 0 0 12px rgba(255, 255, 255, 0.25);
        }
    </style>
</head>

<body class="gradient-bg min-h-screen flex items-center justify-center overflow-hidden">
    <div class="w-full max-w-[680px] mx-auto px-8 text-center">
        <!-- Logo - exact size & color from screenshot -->
        <h1 class="logo-font text-[88px] leading-[82px] text-[#000000] tracking-[-4px] mb-2">
            SafeTrace
        </h1>

        <!-- Tagline - exact font size, weight & color -->
        <p class="text-[21px] font-medium text-[#1f1f1f] tracking-[-0.2px] mb-14">
            Track the truth behind links
        </p>

        <!-- Input + Button - exact dimensions, colors & alignment -->
        <div class="flex items-center justify-center input-container max-w-[620px] mx-auto">
            <form id="urlForm" class="flex w-full">
                <!-- URL Input - exact placeholder color & text size -->
                <input id="urlInput" type="text" placeholder="Paste the URL"
                    class="flex-1 bg-[#f9f9f9] text-[#222222] placeholder:text-[#888888] text-[21px] font-medium h-16 px-10 rounded-l-[9999px] focus:outline-none focus:ring-4 focus:ring-white border-0 shadow-inner"
                    autocomplete="off">

                <!-- Submit Button - exact white + black arrow -->
                <button type="submit" id="submitBtn"
                    class="arrow-btn bg-white h-16 w-16 flex items-center justify-center rounded-r-[9999px] shadow-inner">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none">
                        <path d="M8 5L20 12L8 19V5Z" fill="#000000" />
                    </svg>
                </button>
            </form>
        </div>
    </div>

    <!-- JavaScript - same functionality with exact visual feedback -->
    <script>
        function init() {
            const form = document.getElementById('urlForm');
            const input = document.getElementById('urlInput');
            const btn = document.getElementById('submitBtn');

            // Add result container
            const resultBox = document.createElement('div');
            resultBox.id = 'resultBox';
            resultBox.className = 'mt-8 p-6 rounded-2xl hidden opacity-0 transition-all duration-300 transform translate-y-4';
            form.parentElement.parentElement.appendChild(resultBox);

            form.addEventListener('submit', async function (e) {
                e.preventDefault();

                const url = input.value.trim();

                if (!url) {
                    input.classList.add('!ring-red-400');
                    setTimeout(() => input.classList.remove('!ring-red-400'), 700);
                    return;
                }

                btn.style.transform = 'scale(0.92)';
                btn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" class="animate-spin" width="28" height="28" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="#000" stroke-width="4"></circle>
                        <path class="opacity-75" fill="#000" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                    </svg>
                `;

                // Hide previous result
                resultBox.className = 'mt-8 p-6 rounded-2xl hidden opacity-0 transition-all duration-300 transform translate-y-4';

                // Use a different base URL if the frontend is hosted separately from the backend
                const API_BASE_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
                                        ? '' 
                                        : 'https://YOUR-BACKEND-URL-HERE'; // Replace this later!

                try {
                    const response = await fetch(`${API_BASE_URL}/api/check`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ url: url })
                    });

                    const data = await response.json();

                    resultBox.classList.remove('hidden');

                    // Trigger reflow for animation
                    void resultBox.offsetWidth;

                    if (response.ok) {
                        const reasonsHtml = data.reasons && data.reasons.length > 0
                            ? `<ul class="mt-3 text-sm list-disc pl-5 space-y-1">` + data.reasons.map(r => `<li>${r}</li>`).join('') + `</ul>`
                            : '';

                        if (data.safe) {
                            resultBox.className = 'mt-8 p-6 rounded-2xl bg-green-50 border-2 border-green-200 text-green-800 text-left transition-all duration-300 opacity-100 translate-y-0 shadow-lg';
                            resultBox.innerHTML = `
                                <div class="flex items-start gap-4">
                                    <div class="bg-green-100 p-3 rounded-full text-green-600 mt-1">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                                    </div>
                                    <div class="flex-1 w-full">
                                        <div class="flex justify-between items-center mb-1">
                                            <h3 class="font-bold text-xl">Safe Link</h3>
                                            <span class="font-mono bg-green-200 text-green-800 px-2 py-1 rounded text-sm font-bold">Risk Score: ${data.score}/100</span>
                                        </div>
                                        <p class="text-green-700 font-medium">${data.message}</p>
                                        ${reasonsHtml}
                                    </div>
                                </div>
                            `;
                        } else {
                            const threatsList = data.threats && data.threats.length > 0 ? `<p class="text-red-900 text-sm mt-2 font-mono bg-red-200 inline-block px-2 py-1 rounded mb-2">Google Safe Browsing Match: ${data.threats.join(', ')}</p>` : '';
                            const boxClass = data.risk_level === 'High'
                                ? 'bg-red-50 border-red-200 text-red-800'
                                : 'bg-orange-50 border-orange-200 text-orange-800';
                            const iconBgClass = data.risk_level === 'High' ? 'bg-red-100 text-red-600' : 'bg-orange-100 text-orange-600';
                            const badgeClass = data.risk_level === 'High' ? 'bg-red-200 text-red-900' : 'bg-orange-200 text-orange-900';

                            resultBox.className = `mt-8 p-6 rounded-2xl border-2 text-left transition-all duration-300 opacity-100 translate-y-0 shadow-lg ${boxClass}`;
                            resultBox.innerHTML = `
                                <div class="flex items-start gap-4">
                                    <div class="p-3 rounded-full mt-1 ${iconBgClass}">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                                    </div>
                                    <div class="flex-1 w-full">
                                        <div class="flex justify-between items-center mb-1">
                                            <h3 class="font-bold text-xl">Suspicious Link Detected!</h3>
                                            <span class="font-mono px-2 py-1 rounded text-sm font-bold ${badgeClass}">Risk Score: ${data.score}/100</span>
                                        </div>
                                        <p class="font-medium mb-2">${data.message}</p>
                                        ${threatsList}
                                        ${reasonsHtml}
                                    </div>
                                </div>
                            `;
                        }
                    } else {
                        resultBox.className = 'mt-8 p-6 rounded-2xl bg-yellow-50 border-2 border-yellow-200 text-yellow-800 text-left transition-all duration-300 opacity-100 translate-y-0 shadow-lg';
                        resultBox.innerHTML = `
                                <div class="flex items-center gap-4">
                                    <div class="bg-yellow-100 p-3 rounded-full text-yellow-600">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                                    </div>
                                    <div>
                                        <h3 class="font-bold text-xl mb-1">Error Checking Link</h3>
                                        <p class="text-yellow-700 font-medium">${data.error || 'An unexpected error occurred.'}</p>
                                    </div>
                                </div>
                            `;
                    }
                } catch (error) {
                    resultBox.classList.remove('hidden');
                    void resultBox.offsetWidth;
                    resultBox.className = 'mt-8 p-6 rounded-2xl bg-gray-50 border-2 border-gray-200 text-gray-800 text-left transition-all duration-300 opacity-100 translate-y-0 shadow-lg';
                    resultBox.innerHTML = `
                        <div class="flex items-center gap-4">
                            <div class="bg-gray-200 p-3 rounded-full text-gray-600">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                            </div>
                            <div>
                                <h3 class="font-bold text-xl mb-1">Connection Error</h3>
                                <p class="text-gray-700 font-medium">Could not reach the server. Make sure it's running.</p>
                            </div>
                        </div>
                    `;
                } finally {
                    btn.style.transform = 'scale(1)';
                    btn.innerHTML = `
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none">
                            <path d="M8 5L20 12L8 19V5Z" fill="#000000"/>
                        </svg>
                    `;
                    input.value = '';
                }
            });

            input.addEventListener('keydown', function (e) {
                if (e.key === 'Enter') form.dispatchEvent(new Event('submit'));
            });
        }

        window.onload = init;
    </script>
</body>

</html>
